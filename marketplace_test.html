<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace | Monster Crypt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: white;
        }

        .cyber-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .cyber-card:hover {
            border-color: #06b6d4;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -10px rgba(6, 182, 212, 0.3);
        }

        .rarity-common { color: #94a3b8; border-color: #475569; }
        .rarity-rare { color: #60a5fa; border-color: #2563eb; }
        .rarity-epic { color: #c084fc; border-color: #9333ea; }
        .rarity-legendary { color: #fbbf24; border-color: #d97706; }

        .price-tag {
            background: linear-gradient(90deg, rgba(6, 182, 212, 0.2) 0%, rgba(2, 6, 23, 0.8) 100%);
        }
    </style>
</head>

<body class="pb-20">

    <!-- HEADER / WALLET BAR -->
    <nav class="sticky top-0 z-50 bg-slate-950/80 backdrop-blur-md border-b border-white/5 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-cyan-500 rounded-sm rotate-45 flex items-center justify-center">
                        <span class="text-slate-950 font-bold -rotate-45">M</span>
                    </div>
                    <span class="text-xl font-black tracking-tighter">MARKET<span class="text-cyan-400">PLACE</span></span>
                </a>
            </div>

            <div class="flex items-center gap-4">
                <!-- WALLET SECTION -->
                <div id="wallet-info" class="hidden bg-slate-900 border border-white/10 rounded-full px-4 py-2 flex items-center gap-3">
                    <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                    <span id="user-address" class="text-[10px] font-mono text-slate-500 tracking-tighter">0x00...000</span>
                    <span id="balance" class="text-cyan-400 font-black text-xs">0 $MCT</span>
                </div>
                
                <button id="connect-btn" onclick="connectWallet()" class="px-6 py-2 rounded-full bg-cyan-500 text-slate-950 font-bold text-xs uppercase tracking-widest hover:bg-cyan-400 transition-all">Conectar Carteira</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <!-- ALERT BOX -->
        <div id="web3-alert" class="hidden mb-8 p-4 rounded-2xl bg-amber-500/10 border border-amber-500/20 text-amber-500 text-sm font-medium flex items-center gap-3">
            <span>⚠️ Por favor, mude sua MetaMask para a rede **BNB Chain (BSC)** para ver seu saldo de $MCT.</span>
        </div>
        
        <!-- FILTERS -->
        <div class="flex flex-wrap gap-4 mb-12">
            <button class="px-6 py-2 rounded-full bg-cyan-500 text-slate-950 font-bold text-sm">Todos</button>
            <button class="px-6 py-2 rounded-full bg-slate-900 border border-white/10 hover:border-cyan-500 transition-all text-sm">Equipamentos</button>
            <button class="px-6 py-2 rounded-full bg-slate-900 border border-white/10 hover:border-cyan-500 transition-all text-sm">Consumíveis</button>
            <button class="px-6 py-2 rounded-full bg-slate-900 border border-white/10 hover:border-cyan-500 transition-all text-sm">Artefatos</button>
        </div>

        <!-- ITEMS GRID -->
        <div id="items-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 xl:grid-cols-5 gap-6">
            <!-- Items will be injected by JavaScript -->
        </div>

    </main>

    <!-- BUY MODAL SIMULATION -->
    <div id="modal" class="fixed inset-0 bg-slate-950/90 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-white/10 w-full max-w-md p-8 rounded-[32px] text-center">
            <div id="modal-icon" class="text-6xl mb-6"></div>
            <h2 id="modal-title" class="text-3xl font-bold mb-2"></h2>
            <p id="modal-rarity" class="text-xs font-black uppercase tracking-[0.2em] mb-6"></p>
            <p class="text-slate-400 mb-8">Confirmar a compra deste item usando o saldo da sua carteira?</p>
            <div class="flex gap-4">
                <button onclick="closeModal()" class="flex-1 py-4 rounded-2xl bg-slate-800 font-bold hover:bg-slate-700 transition-all">CANCELAR</button>
                <button id="confirm-btn" class="flex-1 py-4 rounded-2xl bg-cyan-500 text-slate-950 font-bold hover:bg-cyan-400 transition-all">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script>
        const MCT_ADDRESS = "0x46d8b9A261cb91928144c42124Cc1fdd5B9A3d6F";
        const MCT_ABI = [
            "function balanceOf(address owner) view returns (uint256)",
            "function decimals() view returns (uint8)",
            "function symbol() view returns (string)",
            "function transfer(address to, uint256 amount) returns (bool)"
        ];

        let provider, signer, account;
        let balance = 0;

        // Verificador cíclico para ambientes onde a injeção é lenta (especialmente file://)
        window.addEventListener('load', () => {
            const checkInterval = setInterval(() => {
                if (window.ethereum) {
                    console.log("MetaMask detectada via pooling!");
                    document.getElementById('connect-btn').innerText = "Conectar MetaMask 🦊";
                    document.getElementById('connect-btn').classList.remove('opacity-50');
                    clearInterval(checkInterval);
                } else {
                    document.getElementById('connect-btn').innerText = "Aguardando MetaMask...";
                    document.getElementById('connect-btn').classList.add('opacity-50');
                }
            }, 1000);
        });

        async function connectWallet() {
            const providerDetected = window.ethereum || (window.web3 && window.web3.currentProvider);

            if (providerDetected) {
                try {
                    provider = new ethers.BrowserProvider(providerDetected);
                    const accounts = await provider.send("eth_requestAccounts", []);
                    account = accounts[0];
                    signer = await provider.getSigner();
                    
                    updateUI(account);
                    fetchBalance();
                    
                    window.ethereum.on('accountsChanged', (accounts) => {
                        account = accounts[0];
                        updateUI(account);
                        fetchBalance();
                    });
                } catch (error) {
                    alert("Erro na conexão: " + error.message);
                }
            } else {
                alert("ERRO CRÍTICO: MetaMask não encontrada.\n\nSugestão: Use o comando 'npx serve .' no seu terminal e abra o link http://localhost:3000");
            }
        }

        function updateUI(acc) {
            document.getElementById('connect-btn').classList.add('hidden');
            document.getElementById('wallet-info').classList.remove('hidden');
            document.getElementById('user-address').innerText = acc.slice(0, 6) + "..." + acc.slice(-4);
        }

        async function fetchBalance() {
            try {
                const contract = new ethers.Contract(MCT_ADDRESS, MCT_ABI, provider);
                const rawBalance = await contract.balanceOf(account);
                const decimals = await contract.decimals();
                balance = parseFloat(ethers.formatUnits(rawBalance, decimals));
                
                document.getElementById('balance').innerText = balance.toLocaleString() + " $MCT";
            } catch (error) {
                console.error("Erro ao buscar saldo", error);
                document.getElementById('web3-alert').classList.remove('hidden');
            }
        }

        const items = [
            { id: 1, name: "Lâmina de Plasma", rarity: "Comum", price: 250, icon: "⚔️", type: "Equipamento", color: "rarity-common" },
            { id: 2, name: "Cajado de Mana", rarity: "Raro", price: 850, icon: "🔮", type: "Equipamento", color: "rarity-rare" },
            { id: 3, name: "Arco de Neon", rarity: "Épico", price: 2100, icon: "🏹", type: "Equipamento", color: "rarity-epic" },
            { id: 4, name: "Ovo Misterioso", rarity: "Raro", price: 1200, icon: "🥚", type: "Consumível", color: "rarity-rare" },
            { id: 5, name: "Reset de Status", rarity: "Comum", price: 500, icon: "🧪", type: "Consumível", color: "rarity-common" },
            { id: 6, name: "Núcleo Void", rarity: "Lendário", price: 9500, icon: "💎", type: "Artefato", color: "rarity-legendary" },
            { id: 7, name: "Botas Etéreas", rarity: "Raro", price: 1100, icon: "🥾", type: "Equipamento", color: "rarity-rare" },
            { id: 8, name: "Escudo Digital", rarity: "Comum", price: 300, icon: "🛡️", type: "Equipamento", color: "rarity-common" },
            { id: 9, name: "Pena de Fênix", rarity: "Lendário", price: 8000, icon: "🪶", type: "Artefato", color: "rarity-legendary" },
            { id: 10, name: "Chip Upgrade", rarity: "Épico", price: 3500, icon: "💾", type: "Upgrade", color: "rarity-epic" }
        ];

        function renderItems() {
            const grid = document.getElementById('items-grid');
            grid.innerHTML = items.map(item => `
                <div class="cyber-card p-6 rounded-[24px] flex flex-col h-full border border-white/5">
                    <div class="text-4xl mb-6 h-16 flex items-center justify-center bg-white/5 rounded-2xl">${item.icon}</div>
                    <div class="mb-4">
                        <span class="text-[10px] font-black uppercase tracking-widest ${item.color}">${item.rarity}</span>
                        <h3 class="font-bold text-lg leading-tight truncate">${item.name}</h3>
                    </div>
                    <div class="mt-auto">
                        <div class="price-tag px-3 py-2 rounded-lg flex items-center justify-between mb-4">
                            <span class="text-xs text-slate-400 font-bold">PREÇO</span>
                            <span class="text-cyan-400 font-black text-sm">${item.price} MCT</span>
                        </div>
                        <button onclick="openModal(${item.id})" class="w-full py-2 rounded-xl bg-white/5 hover:bg-cyan-500 hover:text-slate-950 transition-all text-xs font-bold uppercase tracking-widest">Comprar</button>
                    </div>
                </div>
            `).join('');
        }

        let selectedItem = null;

        function openModal(id) {
            if (!account) {
                alert("Por favor, conecte sua carteira primeiro!");
                return;
            }
            selectedItem = items.find(i => i.id === id);
            document.getElementById('modal-title').innerText = selectedItem.name;
            document.getElementById('modal-rarity').innerText = selectedItem.rarity;
            document.getElementById('modal-rarity').className = `text-xs font-black uppercase tracking-[0.2em] mb-6 ${selectedItem.color}`;
            document.getElementById('modal-icon').innerText = selectedItem.icon;
            document.getElementById('modal').style.display = 'flex';
            
            document.getElementById('confirm-btn').onclick = () => buyItem();
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        async function buyItem() {
            if (balance >= selectedItem.price) {
                try {
                    // MUDANÇA PARA TRANSAÇÃO REAL:
                    // Aqui simularia ou enviaria para o endereço da Tesouraria/Marketplace
                    alert(`Iniciando transação Web3 para ${selectedItem.name}...\n\nPor favor, confirme na sua MetaMask.`);
                    
                    const contract = new ethers.Contract(MCT_ADDRESS, MCT_ABI, signer);
                    const amount = ethers.parseUnits(selectedItem.price.toString(), 18);
                    
                    // Exemplo: Enviando para a carteira de teste (owner ou contrato marketplace)
                    // const tx = await contract.transfer("ENDERECO_DO_MARKETPLACE", amount);
                    // await tx.wait();
                    
                    alert("Simulação de transação enviada para a rede!");
                    closeModal();
                    fetchBalance(); // Atualiza saldo após compra
                } catch (error) {
                    console.error("Erro na transação", error);
                }
            } else {
                alert("Saldo insuficiente em $MCT!");
            }
        }

        renderItems();
    </script>

</body>

</html>
